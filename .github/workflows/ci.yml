name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Verify NPM package build output
        working-directory: ./frontend/dist
        run: |
          test -f index.js
          test -f index.mjs
          test -f index.d.ts
          echo "NPM package build verified"

      - name: Build backend package
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Lint Python
        working-directory: ./server
        run: |
          pip install flake8
          flake8 acp_server/ --max-line-length=100 --extend-ignore=E501

      - name: Verify package installation
        working-directory: ./server
        run: |
          pip install dist/*.whl
          acp-web-server --help
